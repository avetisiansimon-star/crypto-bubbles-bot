<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
        }
        #chart { width: 100vw; height: 100vh; }
        .bubble-group { cursor: pointer; filter: drop-shadow(0 0 15px rgba(255,255,255,0.05)); }
        
        .label-symbol { font-size: 15px; font-weight: 700; fill: #ffffff; pointer-events: none; letter-spacing: 0.5px; }
        .label-percent { font-size: 11px; font-weight: 500; fill: rgba(255,255,255,0.85); pointer-events: none; }
        
        /* Smooth scale animation on load */
        circle { transition: r 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>
    <div id="chart"></div>

    <svg width="0" height="0">
        <defs>
            <radialGradient id="greenLiquid" cx="35%" cy="35%" r="60%">
                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.45)"/> <stop offset="20%" stop-color="rgba(120, 255, 200, 0.25)"/>
                <stop offset="60%" stop-color="rgba(0, 210, 130, 0.1)"/>
                <stop offset="100%" stop-color="rgba(0, 255, 140, 0.15)"/> </radialGradient>

            <radialGradient id="redLiquid" cx="35%" cy="35%" r="60%">
                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.45)"/>
                <stop offset="20%" stop-color="rgba(255, 120, 150, 0.25)"/>
                <stop offset="60%" stop-color="rgba(210, 40, 40, 0.1)"/>
                <stop offset="100%" stop-color="rgba(255, 60, 60, 0.15)"/>
            </radialGradient>

            <linearGradient id="edgeRainbow" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
                <stop offset="50%" stop-color="rgba(200,150,255,0.3)"/>
                <stop offset="100%" stop-color="rgba(100,255,255,0.5)"/>
            </linearGradient>
        </defs>
    </svg>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        async function initApp() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=45&price_change_percentage=24h');
                const data = await res.json();

                const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);

                const simulation = d3.forceSimulation(data)
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("charge", d3.forceManyBody().strength(10))
                    .force("collide", d3.forceCollide(d => Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35) + 5).strength(0.8))
                    .alphaDecay(0.01);

                const node = svg.selectAll(".bubble-group")
                    .data(data).enter().append("g")
                    .attr("class", "bubble-group")
                    .call(d3.drag()
                        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.1).restart(); d.fx = d.x; d.fy = d.y; })
                        .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                        .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

                // 1. Գլխավոր թափանցիկ մարմինը (The Liquid Body)
                node.append("circle")
                    .attr("r", d => Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35))
                    .style("fill", d => d.price_change_percentage_24h >= 0 ? "url(#greenLiquid)" : "url(#redLiquid)")
                    .style("stroke", "url(#edgeRainbow)")
                    .style("stroke-width", "0.8px")
                    .style("backdrop-filter", "blur(8px)");

                // 2. Լրացուցիչ ներքին փայլ վերևում (Specular Highlight)
                node.append("ellipse")
                    .attr("rx", d => Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35) * 0.4)
                    .attr("ry", d => Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35) * 0.2)
                    .attr("cx", d => -Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35) * 0.25)
                    .attr("cy", d => -Math.max(Math.abs(d.price_change_percentage_24h) * 8, 35) * 0.3)
                    .style("fill", "rgba(255,255,255,0.25)")
                    .style("filter", "blur(3px)");

                // 3. Տեքստ
                node.append("text").attr("class", "label-symbol").attr("dy", "-2").attr("text-anchor", "middle").text(d => d.symbol.toUpperCase());
                node.append("text").attr("class", "label-percent").attr("dy", "16").attr("text-anchor", "middle").text(d => (d.price_change_percentage_24h > 0 ? "+" : "") + d.price_change_percentage_24h.toFixed(2) + "%");

                simulation.on("tick", () => {
                    node.attr("transform", d => `translate(${d.x},${d.y})`);
                });
            } catch (err) { console.error(err); }
        }
        initApp();
    </script>
</body>
</html>
