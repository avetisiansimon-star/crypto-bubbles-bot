<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #0b0e11; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; color: white; }
        #chart { width: 100vw; height: 100vh; cursor: grab; }
        .bubble { stroke: rgba(255,255,255,0.2); stroke-width: 1px; cursor: pointer; transition: filter 0.2s; }
        .bubble:hover { filter: brightness(1.2); }
        .label { pointer-events: none; text-anchor: middle; font-weight: bold; fill: white; font-size: 12px; }
        .percent { pointer-events: none; text-anchor: middle; fill: rgba(255,255,255,0.8); font-size: 10px; }
    </style>
</head>
<body>
    <div id="chart"></div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        async function createBubbles() {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&price_change_percentage=24h');
            const data = await res.json();

            const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);

            const simulation = d3.forceSimulation(data)
                .force("x", d3.forceX(width / 2).strength(0.05))
                .force("y", d3.forceY(height / 2).strength(0.05))
                .force("collide", d3.forceCollide(d => Math.abs(d.price_change_percentage_24h) * 5 + 25).iterations(2))
                .force("charge", d3.forceManyBody().strength(-15));

            const node = svg.selectAll(".node")
                .data(data).enter().append("g")
                .call(d3.drag()
                    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

            node.append("circle")
                .attr("class", "bubble")
                .attr("r", d => Math.abs(d.price_change_percentage_24h) * 5 + 25)
                .attr("fill", d => d.price_change_percentage_24h >= 0 ? "#00c882" : "#ff3131");

            node.append("text").attr("class", "label").text(d => d.symbol.toUpperCase());
            node.append("text").attr("class", "percent").attr("dy", "14px")
                .text(d => d.price_change_percentage_24h.toFixed(1) + "%");

            simulation.on("tick", () => {
                node.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }
        createBubbles();
    </script>
</body>
</html>
