<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crypto Bubbles Premium</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --apple-blue: #007AFF; --green: #32D74B; --red: #FF453A; }
        body { background: radial-gradient(circle, #1c1c1e 0%, #000 100%); color: white; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
        #header { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 10px 15px; border-radius: 15px; font-size: 12px; border: 0.5px solid rgba(255,255,255,0.1); }
        #details { 
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 45%; 
            background: rgba(28,28,30,0.98); backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255,255,255,0.1); border-radius: 25px 25px 0 0;
            transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1); padding: 25px; z-index: 100; box-sizing: border-box;
        }
        #details.active { bottom: 0; }
        .btn-add { width: 100%; padding: 15px; margin-top: 20px; background: var(--apple-blue); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; }
        .bubble { cursor: pointer; stroke: rgba(255,255,255,0.2); transition: transform 0.2s; }
    </style>
</head>
<body>
    <div id="header">
        <div class="stat-card">Fear & Greed: <span id="fg-val">...</span></div>
        <div class="stat-card">Portfolio: <span id="port-val">$0.00</span></div>
    </div>
    <div id="chart"></div>
    <div id="details">
        <div onclick="toggleDetails(false)" style="float:right; color:var(--apple-blue);">Փակել</div>
        <h2 id="det-name">---</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; font-size:14px;">
            <div>Գին: <b id="det-price"></b></div>
            <div>24ժ: <b id="det-change"></b></div>
            <div>Market Cap: <b id="det-cap"></b></div>
            <div>Volume: <b id="det-vol"></b></div>
        </div>
        <button class="btn-add" id="add-to-port">Ավելացնել Պորտֆելում</button>
    </div>

    <script>
        let currentData = [];
        let myPortfolio = JSON.parse(localStorage.getItem('crypto_portfolio')) || {};
        const width = window.innerWidth, height = window.innerHeight;

        async function init() {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=40&price_change_percentage=24h');
            currentData = await res.json();
            
            fetch('https://api.alternative.me/fng/').then(r => r.json()).then(d => {
                document.getElementById('fg-val').innerText = d.data[0].value;
            });

            const svg = d3.select("#chart").append("svg").attr("width", width).attr("height", height);
            const simulation = d3.forceSimulation(currentData)
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide(d => Math.abs(d.price_change_percentage_24h) * 6 + 40))
                .on("tick", () => node.attr("transform", d => `translate(${d.x},${d.y})`));

            const node = svg.selectAll("g").data(currentData).enter().append("g")
                .on("click", (e, d) => toggleDetails(true, d))
                .call(d3.drag().on("start", dragstart).on("drag", dragged).on("end", dragend));

            node.append("circle").attr("r", d => Math.abs(d.price_change_percentage_24h) * 6 + 40)
                .attr("fill", d => d.price_change_percentage_24h >= 0 ? "rgba(50,215,75,0.2)" : "rgba(255,69,58,0.2)")
                .attr("stroke", d => d.price_change_percentage_24h >= 0 ? var(--green) : var(--red));

            node.append("text").text(d => d.symbol.toUpperCase()).attr("text-anchor", "middle").attr("dy", ".3em").style("fill", "#fff").style("font-weight", "bold");
            updatePortfolioDisplay();
        }

        function toggleDetails(show, coin) {
            const panel = document.getElementById('details');
            if(show) {
                document.getElementById('det-name').innerText = coin.name;
                document.getElementById('det-price').innerText = "$" + coin.current_price.toLocaleString();
                document.getElementById('det-change').innerText = coin.price_change_percentage_24h.toFixed(2) + "%";
                document.getElementById('det-cap').innerText = (coin.market_cap / 1e9).toFixed(1) + "B";
                document.getElementById('add-to-port').onclick = () => {
                    let amt = prompt("Քանակը:");
                    if(amt) { myPortfolio[coin.symbol] = (myPortfolio[coin.symbol] || 0) + parseFloat(amt);
                    localStorage.setItem('crypto_portfolio', JSON.stringify(myPortfolio)); updatePortfolioDisplay(); }
                };
                panel.classList.add('active');
            } else panel.classList.remove('active');
        }

        function updatePortfolioDisplay() {
            let total = 0;
            Object.entries(myPortfolio).forEach(([sym, amt]) => {
                const coin = currentData.find(c => c.symbol === sym);
                if(coin) total += coin.current_price * amt;
            });
            document.getElementById('port-val').innerText = "$" + total.toLocaleString();
        }

        function dragstart(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
        function dragend(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
        init();
    </script>
</body>
</html>
