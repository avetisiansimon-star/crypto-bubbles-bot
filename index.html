<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Bubbles Live</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; }
        .header { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Live Crypto Bubbles</h2>
        <p id="status">Բեռնվում է...</p>
    </div>
    <canvas id="bubbleChart"></canvas>

    <script>
        const ctx = document.getElementById('bubbleChart').getContext('2d');
        
        async function fetchPrices() {
            const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=20&page=1&price_change_percentage=24h');
            const data = await res.json();
            
            const chartData = data.map(coin => ({
                x: Math.random() * 100, // Պղպջակի դիրքը
                y: Math.random() * 100,
                r: Math.abs(coin.price_change_percentage_24h) * 5 + 10, // Չափը կախված աճից
                label: coin.symbol.toUpperCase(),
                change: coin.price_change_percentage_24h
            }));

            updateChart(chartData);
            document.getElementById('status').innerText = "Թարմացված է";
        }

        function updateChart(data) {
            new Chart(ctx, {
                type: 'bubble',
                data: {
                    datasets: [{
                        label: 'Crypto Bubbles',
                        data: data,
                        backgroundColor: data.map(d => d.change >= 0 ? 'rgba(34, 197, 94, 0.7)' : 'rgba(239, 68, 68, 0.7)'),
                        borderColor: 'white',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: { x: { display: false }, y: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        fetchPrices();
        setInterval(fetchPrices, 60000); // Թարմացնել ամեն րոպե
    </script>
</body>
</html>
